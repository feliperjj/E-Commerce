<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard Admin - Bento E-Commerce</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      background-color: #f4f6f9;
    }
    
    .admin-container {
      max-width: 1000px; /* Aumentado para caber o dashboard */
      margin: 60px auto;
      background: #1e1e24; 
      padding: 40px 50px;
      border-radius: 16px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      color: #ffffff;
    }

    .admin-header {
      border-bottom: 1px solid #2a2a40;
      padding-bottom: 20px;
      margin-bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .admin-header h2 {
      margin: 0;
      color: #ffffff;
      font-size: 2rem;
    }

    /* =========================================
       MÉTRICAS (KPIs) E DASHBOARD
       ========================================= */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .kpi-card {
      background: #111116;
      border: 1px solid #2a2a40;
      border-radius: 12px;
      padding: 25px;
      display: flex;
      align-items: center;
      gap: 20px;
      transition: transform 0.3s ease;
    }

    .kpi-card:hover {
      transform: translateY(-5px);
      border-color: #3498db;
    }

    .kpi-icon {
      font-size: 2.5rem;
      background: rgba(52, 152, 219, 0.1);
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }

    .kpi-icon.green { background: rgba(46, 204, 113, 0.1); color: #2ecc71; }
    .kpi-icon.blue { background: rgba(52, 152, 219, 0.1); color: #3498db; }
    .kpi-icon.red { background: rgba(232, 65, 24, 0.1); color: #e84118; }

    .kpi-info h3 {
      margin: 0;
      font-size: 0.9rem;
      color: #a0a0b2;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .kpi-info p {
      margin: 5px 0 0 0;
      font-size: 1.8rem;
      font-weight: bold;
      color: #ffffff;
    }

    /* =========================================
       ALERTA DE ESTOQUE CRÍTICO
       ========================================= */
    .stock-alerts {
      background: #111116;
      border: 1px solid #2a2a40;
      border-radius: 12px;
      padding: 25px;
      margin-bottom: 40px;
    }

    .stock-alerts h3 {
      margin-top: 0;
      color: #e84118;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .tabela-stock {
      width: 100%;
      border-collapse: collapse;
      color: #000;
    }

    .tabela-stock th, .tabela-stock td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #2a2a40;
      color: #333;
    }

    .tabela-stock th {
      color: #666;
      font-size: 0.85rem;
      text-transform: uppercase;
    }

    .badge-critical {
      background: rgba(232, 65, 24, 0.2);
      color: #ff6b6b;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: bold;
    }

    /* =========================================
       FORMULÁRIO DE CADASTRO
       ========================================= */
    .form-group { margin-bottom: 25px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #a0a0b2; font-size: 0.95rem; }
    .form-group input, .form-group select { width: 100%; padding: 14px 15px; border-radius: 8px; border: 1px solid #3a3a50; background: #111116; color: #ffffff; font-size: 1rem; transition: all 0.3s ease; outline: none; }
    .form-group input:focus, .form-group select:focus { border-color: #3498db; box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.25); }
    .form-row { display: flex; gap: 20px; }
    .form-row .form-group { flex: 1; }
    input[type="file"] { padding: 12px; background: #111116; border: 2px dashed #4b6584; cursor: pointer; color: #a0a0b2; }
    input[type="file"]:hover { border-color: #3498db; color: #fff; }
    
    .btn-submit { background: #3498db; color: white; border: none; padding: 16px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; transition: all 0.3s ease; }
    .btn-submit:hover { background: #2980b9; transform: translateY(-2px); }
    .btn-submit:disabled { background: #95a5a6; cursor: not-allowed; transform: none; }

    #status { margin-top: 25px; padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; display: none; }
    .status-success { background: rgba(46, 204, 113, 0.15); color: #2ecc71; border: 1px solid #2ecc71; }
    .status-error { background: rgba(232, 65, 24, 0.15); color: #e84118; border: 1px solid #e84118; }
  </style>
</head>
<body>

  <header class="header">
    <nav>
      <ul class="header-menu">
        <li><span class="user-info">🔒 Dashboard Admin</span></li>
        <li><a href="index.html">Ver Loja</a></li>
        <li><a href="./api/logout.php" class="btn-logout">Sair</a></li>
      </ul>
    </nav>
  </header>

  <main class="admin-container">
    <div class="admin-header">
      <h2>📊 Visão Geral</h2>
    </div>

    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-icon green">💰</div>
        <div class="kpi-info">
          <h3>Faturamento (Estimado)</h3>
          <p id="kpi-faturamento">R$ 0,00</p>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon blue">📦</div>
        <div class="kpi-info">
          <h3>Total de Produtos</h3>
          <p id="kpi-produtos">0</p>
        </div>
      </div>
      <div class="kpi-card">
        <div class="kpi-icon red">⚠️</div>
        <div class="kpi-info">
          <h3>Estoque Baixo</h3>
          <p id="kpi-alertas">0</p>
        </div>
      </div>
    </div>

    <div class="stock-alerts" id="container-alertas" style="display: none;">
      <h3>⚠️ Atenção: Estoque Crítico (Menos de 5 unidades)</h3>
      <table class="tabela-stock">
        <thead>
          <tr>
            <th>ID</th>
            <th>Produto</th>
            <th>Categoria</th>
            <th>Quantidade Restante</th>
          </tr>
        </thead>
        <tbody id="lista-estoque-critico">
          </tbody>
      </table>
    </div>

    <div class="admin-header" style="margin-top: 50px;">
      <h2>📦 Cadastrar Novo Pokémon</h2>
    </div>

    <form id="formAdmin">
      <div class="form-group">
        <label for="nome">Nome do Pokémon</label>
        <input type="text" id="nome" name="nome" required>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label for="categoria">Categoria</label>
          <select id="categoria" name="categoria" required>
            <option value="Fogo">Fogo</option>
            <option value="Água">Água</option>
            <option value="Grama">Grama</option>
            <option value="Elétrico">Elétrico</option>
          </select>
        </div>
        <div class="form-group">
          <label for="preco">Preço (R$)</label>
          <input type="number" step="0.01" id="preco" name="preco" required>
        </div>
        <div class="form-group">
          <label for="quantidade">Estoque (Qtd)</label>
          <input type="number" id="quantidade" name="quantidade" required>
        </div>
      </div>

      <div class="form-group">
        <label for="foto">Imagem do Modelo 3D</label>
        <input type="file" id="foto" name="foto" accept="image/*" required>
      </div>

      <button type="submit" class="btn-submit">Gravar Produto no Catálogo</button>
    </form>
    <div id="status"></div>
  </main>

  <script>
    // 1. Lógica para Carregar o Dashboard (KPIs e Estoque Crítico)
    async function carregarDashboard() {
      try {
        // Puxa os dados dos produtos existentes na loja
        const res = await fetch('./api/api_produtos.php');
        const produtos = await res.json();
        
        let totalProdutos = produtos.length;
        let produtosCriticos = [];
        let faturamentoEstimado = 0; // Se você tiver uma API de pedidos, pode puxar de lá depois.

        produtos.forEach(p => {
          // Calcula um faturamento simulado baseado no preço * (algo fixo) ou deixa 0 até ter a api_pedidos real
          // Aqui usamos apenas para contar
          if (Number(p.quantidade) < 5) {
            produtosCriticos.push(p);
          }
        });

        // Atualiza os Cards
        document.getElementById('kpi-produtos').innerText = totalProdutos;
        document.getElementById('kpi-alertas').innerText = produtosCriticos.length;

        // Atualiza a Tabela de Estoque Crítico
        if (produtosCriticos.length > 0) {
          document.getElementById('container-alertas').style.display = 'block';
          const tbody = document.getElementById('lista-estoque-critico');
          tbody.innerHTML = '';
          
          let html = '';
          produtosCriticos.forEach(p => {
            html += `
              <tr>
                <td>#${p.id}</td>
                <td><strong>${p.nome}</strong></td>
                <td>${p.categoria}</td>
                <td><span class="badge-critical">${p.quantidade} un.</span></td>
              </tr>
            `;
          });
          tbody.innerHTML = html;
        }
      } catch (error) {
        console.error("Erro ao carregar métricas", error);
      }
    }

    // Carrega o dashboard assim que a página abrir
    carregarDashboard();

    // 2. Lógica de Cadastro do Formulário
    document.getElementById('formAdmin').onsubmit = async (e) => {
      e.preventDefault();
      
      const st = document.getElementById('status');
      const btn = e.target.querySelector('.btn-submit');
      
      st.style.display = 'block';
      st.className = '';
      st.innerText = "A guardar no servidor...";
      btn.disabled = true;
      btn.innerText = "Processando...";

      const fd = new FormData(e.target);
      
      try {
        const res = await fetch('./api/cadastrar_produto.php', { 
          method: 'POST', 
          body: fd, 
          credentials: 'include' 
        });
        const r = await res.json();
        
        if(r.sucesso) {
          st.innerText = "🎉 Pokémon adicionado ao catálogo com sucesso!";
          st.classList.add('status-success');
          e.target.reset();
          // Atualiza o Dashboard automaticamente após cadastrar!
          carregarDashboard(); 
        } else {
          st.innerText = "❌ Erro ao salvar: " + (r.erro || "Verifique as permissões de administrador.");
          st.classList.add('status-error');
        }
      } catch (error) {
        st.innerText = "❌ Falha na comunicação.";
        st.classList.add('status-error');
      }
      
      btn.disabled = false;
      btn.innerText = "Gravar Produto no Catálogo";
    };
  </script>
</body>
</html>
