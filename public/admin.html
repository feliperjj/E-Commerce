<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Dashboard Admin - Bento E-Commerce</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* AJUSTE DE CORES PARA CONTRASTE MÁXIMO E GLASSMORPHISM */
    :root {
      --bg-transparente: rgba(30, 30, 36, 0.95);
      --texto-branco: #ffffff; 
      --verde-neon: #2ecc71;
      --azul-claro: #3498db;
      --borda: rgba(255, 255, 255, 0.1);
    }

    body { 
      background: radial-gradient(circle at top, #1a1a24 0%, #111116 100%);
      background-attachment: fixed;
      font-family: 'Inter', sans-serif; 
      color: var(--texto-branco);
      margin: 0;
      padding: 0;
    }
    
    .admin-container { 
      max-width: 1200px; 
      margin: 40px auto; 
      padding: 0 20px;
    }

    /* KPIs */
    .kpi-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
      gap: 30px; 
      margin-bottom: 40px; 
    }
    
    .kpi-card { 
      background: var(--bg-transparente); 
      border: 1px solid var(--borda); 
      padding: 30px; 
      border-radius: 16px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
    }
    
    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, #3498db, #2ecc71);
    }

    .kpi-info h3 { 
      color: #a0a0b2; 
      font-size: 1rem; 
      margin: 0; 
      text-transform: uppercase; 
      letter-spacing: 1px;
    }
    .kpi-info p { 
      color: var(--verde-neon); 
      font-size: 2.5rem; 
      margin: 10px 0 0 0; 
      font-weight: bold; 
      text-shadow: 0 0 10px rgba(46, 204, 113, 0.3);
    }

    /* Tabela de Vendas */
    .section-vendas { 
      background: var(--bg-transparente); 
      padding: 30px; 
      border-radius: 16px; 
      border: 1px solid var(--borda); 
      margin-bottom: 40px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.5);
    }
    
    .section-vendas h3 { 
      color: var(--azul-claro); 
      margin-top: 0; 
      border-bottom: 1px solid var(--borda); 
      padding-bottom: 15px; 
      font-size: 1.4rem;
    }

    .tabela-container {
      overflow-x: auto;
    }

    .tabela-vendas { 
      width: 100%; 
      border-collapse: collapse; 
    } 
    
    .tabela-vendas th { 
      text-align: left; 
      padding: 15px; 
      background: rgba(0,0,0,0.4); 
      color: #a0a0b2; 
      border-bottom: 1px solid var(--borda);
      font-weight: 600;
    }
    
    .tabela-vendas td { 
      padding: 15px; 
      border-bottom: 1px solid rgba(255,255,255,0.05); 
      color: #e0e0e0; 
      font-size: 1rem;
    }

    .tabela-vendas tr:hover td {
      background: rgba(255,255,255,0.02);
    }

    .td-user { color: #3498db !important; font-weight: bold; }
    .td-total { color: #2ecc71 !important; font-weight: bold; text-align: right; }

    /* Formulário */
    .form-box { 
      background: var(--bg-transparente); 
      padding: 30px; 
      border-radius: 16px; 
      border: 1px solid var(--borda); 
      box-shadow: 0 15px 30px rgba(0,0,0,0.5);
    }

    .form-box h3 {
      color: var(--verde-neon); 
      margin-top: 0; 
      border-bottom: 1px solid var(--borda); 
      padding-bottom: 15px; 
      font-size: 1.4rem;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label { 
      display: block; 
      color: #a0a0b2; 
      margin-bottom: 8px; 
      font-weight: 600; 
      font-size: 0.9rem;
    }

    .form-group input, .form-group select { 
      width: 100%; 
      padding: 14px; 
      background: rgba(0,0,0,0.4); 
      color: #fff; 
      border: 1px solid rgba(255,255,255,0.1); 
      border-radius: 8px;
      outline: none;
      box-sizing: border-box;
      transition: all 0.3s;
    }

    .form-group input:focus, .form-group select:focus {
      border-color: #3498db;
      box-shadow: 0 0 0 2px rgba(52,152,219,0.2);
    }

    .btn-submit { 
      background: #3498db; 
      color: #fff; 
      border: none; 
      padding: 16px; 
      cursor: pointer; 
      width: 100%; 
      font-weight: bold; 
      font-size: 1.2rem;
      border-radius: 8px;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(52,152,219,0.4);
    }

    .btn-submit:hover {
      background: #2980b9;
      transform: translateY(-2px);
    }
    
    /* Tela de carregamento do Admin */
    #tela-bloqueio {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        background: #111116; z-index: 9999; display: flex; 
        justify-content: center; align-items: center; color: white; font-size: 1.5rem;
    }
  </style>
</head>
<body>

  <div id="tela-bloqueio">🔐 Verificando credenciais de administrador...</div>

  <header style="background: rgba(17,17,22,0.9); padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100;">
    <div style="font-size: 1.5rem; font-weight: bold;">
      Bento <span style="color: #3498db;">E-Commerce</span>
    </div>
    <div>
      <span style="color: #2ecc71; font-weight: bold; margin-right: 20px; border: 1px solid #2ecc71; padding: 5px 10px; border-radius: 20px;">PAINEL ADMIN</span>
      <a href="index.html" style="color: #a0a0b2; text-decoration: none; font-weight: bold; transition: color 0.3s;">← VOLTAR À LOJA</a>
    </div>
  </header>

  <main class="admin-container" id="conteudo-admin" style="display: none;">
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-info"><h3>RECEITA TOTAL (R$)</h3><p id="kpi-faturamento">R$ 0,00</p></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-info"><h3>PRODUTOS NO CATÁLOGO</h3><p id="kpi-produtos" style="color: var(--azul-claro); text-shadow: 0 0 10px rgba(52,152,219,0.3);">0</p></div>
      </div>
    </div>

    <section class="section-vendas">
      <h3>📈 RELATÓRIO DE VENDAS RECENTES</h3>
      <div class="tabela-container">
        <table class="tabela-vendas">
          <thead>
            <tr>
              <th>USUÁRIO</th>
              <th>PRODUTO</th>
              <th style="text-align:center;">QTD</th>
              <th style="text-align:right;">TOTAL</th>
            </tr>
          </thead>
          <tbody id="lista-vendas-geral">
            <tr><td colspan="4" style="text-align:center; padding: 40px; color: #a0a0b2;">Buscando dados no servidor...</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <div class="form-box">
      <h3>📦 CADASTRAR NOVO PRODUTO</h3>
      <form id="formAdmin">
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
          <div class="form-group"><label>Nome do Item</label><input type="text" name="nome" placeholder="Ex: Charizard" required></div>
          <div class="form-group"><label>Categoria</label>
            <select name="categoria">
              <option value="Fogo">🔥 Fogo</option>
              <option value="Água">💧 Água</option>
              <option value="Grama">🌿 Grama</option>
              <option value="Elétrico">⚡ Elétrico</option>
              <option value="Normal">⭐ Normal</option>
            </select>
          </div>
          <div class="form-group"><label>Preço Unitário (R$)</label><input type="number" step="0.01" name="preco" placeholder="150.00" required></div>
          <div class="form-group"><label>Quantidade Estoque</label><input type="number" name="quantidade" placeholder="10" required></div>
        </div>
        <div class="form-group"><label>Imagem do Produto</label><input type="file" name="foto" accept="image/*" required style="padding: 10px;"></div>
        <button type="submit" class="btn-submit">GRAVAR NO BANCO DE DADOS</button>
      </form>
      <p id="status" style="text-align:center; font-weight:bold; margin-top: 15px; font-size: 1.1rem;"></p>
    </div>
  </main>

  <script>
    // 🛡️ 1. CATRACA DE SEGURANÇA: Verifica se é admin antes de mostrar a tela
    async function iniciarPainelAdmin() {
        try {
            const resSessao = await fetch('/backend/verificar_sessao.php', { credentials: 'include' });
            const sessao = await resSessao.json();
            
            if (!sessao.logado || Number(sessao.is_admin) !== 1) {
                const bloqueio = document.getElementById('tela-bloqueio');
                bloqueio.innerHTML = "❌ ACESSO NEGADO: Apenas administradores.";
                bloqueio.style.color = "#e74c3c";
                bloqueio.style.background = "#111116";
                
                // Aguarda 2 segundos para o usuário ler a mensagem antes de chutar pra Home
                setTimeout(() => {
                    window.location.replace('index.html'); 
                }, 2000);
                
                return; 
            }

            document.getElementById('tela-bloqueio').style.display = 'none';
            document.getElementById('conteudo-admin').style.display = 'block';
            
            carregarDados();

        } catch (error) {
            window.location.replace('index.html');
        }
    }

    // 2. Função que carrega os gráficos
    async function carregarDados() {
      try {
        const resProd = await fetch('/backend/api_produtos.php');
        const produtos = await resProd.json();
        document.getElementById('kpi-produtos').innerText = produtos.length || 0;

        const resVendas = await fetch('/backend/api_todos_pedidos.php', { credentials: 'include' });
        const vendas = await resVendas.json();

        const tbody = document.getElementById('lista-vendas-geral');
        let faturamento = 0;

        if (Array.isArray(vendas) && vendas.length > 0) {
          tbody.innerHTML = vendas.map(v => {
            faturamento += Number(v.total);
            const precoFormatado = Number(v.total).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            return `<tr>
              <td class="td-user">@${v.usuario}</td>
              <td style="font-weight: 500;">${v.nome_produto}</td>
              <td style="text-align:center;">${v.quantidade}x</td>
              <td class="td-total">${precoFormatado}</td>
            </tr>`;
          }).join('');
        } else {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 40px; color: #a0a0b2;">Nenhuma venda encontrada.</td></tr>';
        }

        document.getElementById('kpi-faturamento').innerText = faturamento.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

      } catch (e) { console.error("Erro ao carregar dados:", e); }
    }

    // 3. Cadastrar Produto
    document.getElementById('formAdmin').onsubmit = async (e) => {
      e.preventDefault();
      const status = document.getElementById('status');
      status.style.color = "var(--azul-claro)";
      status.innerText = "⏳ Gravando dados...";
      
      try {
          const res = await fetch('/backend/cadastrar_produto.php', { 
            method: 'POST', 
            body: new FormData(e.target), 
            credentials: 'include' 
          });
          
          if (res.status === 403) {
             status.innerText = "❌ ERRO: Acesso negado pelo servidor!";
             status.style.color = "#e74c3c";
             return;
          }

          const r = await res.json();
          status.innerText = r.sucesso ? "✅ SUCESSO AO CADASTRAR!" : "❌ ERRO: " + r.erro;
          status.style.color = r.sucesso ? "var(--verde-neon)" : "#e74c3c";
          if(r.sucesso) { e.target.reset(); carregarDados(); }
      } catch (e) {
          status.innerText = "❌ ERRO: Falha na comunicação.";
          status.style.color = "#e74c3c";
      }
    };

    iniciarPainelAdmin();
  </script>
</body>
</html>
