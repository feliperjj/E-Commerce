<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Dashboard Admin - Bento E-Commerce</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background-color: #f4f6f9; }
    .admin-container { max-width: 1100px; margin: 40px auto; background: #1e1e24; padding: 40px; border-radius: 16px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); color: #fff; }
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .kpi-card { background: #111116; border: 1px solid #2a2a40; border-radius: 12px; padding: 20px; display: flex; align-items: center; gap: 15px; }
    .kpi-info p { margin: 5px 0; font-size: 1.5rem; font-weight: bold; }
    
    /* Estilo das Tabelas no Admin */
    .section-vendas { background: #111116; border-radius: 12px; padding: 20px; margin-bottom: 30px; border: 1px solid #2ecc71; }
    .tabela-vendas { width: 100%; border-collapse: collapse; margin-top: 15px; }
    .tabela-vendas th, .tabela-vendas td { padding: 12px; text-align: left; border-bottom: 1px solid #2a2a40; font-size: 0.9rem; }
    .tabela-vendas th { color: #a0a0b2; text-transform: uppercase; font-size: 0.75rem; }
    
    .form-group input, .form-group select { width: 100%; padding: 12px; border-radius: 8px; background: #111116; color: #fff; border: 1px solid #3a3a50; margin-top: 5px; }
    .btn-submit { background: #3498db; color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 20px; }
  </style>
</head>
<body>

  <header class="header">
    <nav><ul class="header-menu"><li><a href="index.html">← Voltar à Loja</a></li></ul></nav>
  </header>

  <main class="admin-container">
    <h2>📊 Dashboard de Negócios</h2>

    <div class="kpi-grid">
      <div class="kpi-card">
        <div style="font-size: 2rem;">💰</div>
        <div class="kpi-info"><h3>Faturamento Total</h3><p id="kpi-faturamento">R$ 0,00</p></div>
      </div>
      <div class="kpi-card">
        <div style="font-size: 2rem;">📦</div>
        <div class="kpi-info"><h3>Itens em Estoque</h3><p id="kpi-produtos">0</p></div>
      </div>
    </div>

    <section class="section-vendas">
      <h3 style="color: #2ecc71;">🛒 Últimas Vendas Realizadas</h3>
      <table class="tabela-vendas">
        <thead>
          <tr>
            <th>Cliente</th>
            <th>Produto</th>
            <th>Qtd</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody id="lista-vendas-geral">
          <tr><td colspan="4">Carregando vendas...</td></tr>
        </tbody>
      </table>
    </section>

    <section style="background: #111116; padding: 25px; border-radius: 12px;">
      <h3>📦 Cadastrar Novo Pokémon</h3>
      <form id="formAdmin">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
          <div class="form-group"><label>Nome</label><input type="text" name="nome" required></div>
          <div class="form-group"><label>Categoria</label>
            <select name="categoria">
              <option value="Fogo">Fogo</option><option value="Água">Água</option>
              <option value="Grama">Grama</option><option value="Elétrico">Elétrico</option>
            </select>
          </div>
          <div class="form-group"><label>Preço (R$)</label><input type="number" step="0.01" name="preco" required></div>
          <div class="form-group"><label>Estoque Inicial</label><input type="number" name="quantidade" required></div>
        </div>
        <div class="form-group" style="margin-top:15px;"><label>Foto do Produto</label><input type="file" name="foto" accept="image/*" required></div>
        <button type="submit" class="btn-submit">Gravar no Catálogo</button>
      </form>
      <p id="status" style="text-align:center; margin-top:15px;"></p>
    </section>
  </main>

  <script>
    async function carregarDados() {
      try {
        // 1. Carrega Produtos para o KPI
        const resProd = await fetch('./api/api_produtos.php');
        const produtos = await resProd.json();
        document.getElementById('kpi-produtos').innerText = produtos.length;

        // 2. Carrega Vendas para a Tabela e Faturamento (Fix: credentials para admin)
        const resVendas = await fetch('./api/api_todos_pedidos.php', { credentials: 'include' });
        const vendas = await resVendas.json();

        const tbody = document.getElementById('lista-vendas-geral');
        let faturamento = 0;

        if (vendas.length > 0) {
          tbody.innerHTML = vendas.map(v => {
            faturamento += Number(v.total);
            return `<tr>
              <td>${v.usuario}</td>
              <td><strong>${v.nome_produto}</strong></td>
              <td>${v.quantidade}</td>
              <td style="color:#2ecc71;">R$ ${Number(v.total).toFixed(2)}</td>
            </tr>`;
          }).join('');
        } else {
          tbody.innerHTML = '<tr><td colspan="4">Nenhuma venda registrada.</td></tr>';
        }

        document.getElementById('kpi-faturamento').innerText = faturamento.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

      } catch (e) { console.error("Erro no Dashboard", e); }
    }

    // Cadastro de produto
    document.getElementById('formAdmin').onsubmit = async (e) => {
      e.preventDefault();
      const status = document.getElementById('status');
      status.innerText = "Enviando...";
      
      const res = await fetch('./api/cadastrar_produto.php', { 
        method: 'POST', 
        body: new FormData(e.target), 
        credentials: 'include' 
      });
      const r = await res.json();
      status.innerText = r.sucesso ? "✅ Sucesso!" : "❌ Erro: " + r.erro;
      if(r.sucesso) { e.target.reset(); carregarDados(); }
    };

    carregarDados();
  </script>
</body>
</html>
