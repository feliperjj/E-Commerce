<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Dashboard Admin - Pokémon Store</title>
  <link rel="stylesheet" href="./css/style.css">
  <style>
    body { background-color: #f4f6f9; font-family: sans-serif; }
    .admin-wrapper { max-width: 1000px; margin: 30px auto; padding: 20px; }
    .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
    .kpi-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
    .admin-section { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 30px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .form-group { display: flex; flex-direction: column; margin-bottom: 10px; }
    .form-group label { font-weight: bold; margin-bottom: 5px; }
    .form-group input, .form-group select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
    .btn-submit { grid-column: span 2; padding: 15px; background: #2ecc71; color: white; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 16px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    table th, table td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
    .btn-excluir { background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <header class="header">
    <nav>
      <ul class="header-menu">
        <li><a href="index.html">← Voltar à Loja</a></li>
        <li><h2 style="color: white; margin: 0;">Painel de Controlo</h2></li>
      </ul>
    </nav>
  </header>

  <main class="admin-wrapper">
    <div class="kpi-grid">
      <div class="kpi-card"><h3>Clientes</h3><p id="kpi-usuarios">...</p></div>
      <div class="kpi-card"><h3>Faturamento</h3><p id="kpi-faturamento">...</p></div>
      <div class="kpi-card"><h3>Stock Crítico</h3><p id="kpi-alertas" style="color:red">...</p></div>
    </div>

    <section class="admin-section">
      <h2>Cadastrar Novo Produto (com Foto do PC)</h2>
      <form id="formAdicionarProduto" class="form-grid">
        <div class="form-group">
          <label>Nome do Pokémon</label>
          <input type="text" name="nome" required>
        </div>
        <div class="form-group">
          <label>Categoria</label>
          <select name="categoria">
            <option value="Geral">Geral</option>
            <option value="Fogo">Fogo</option>
            <option value="Água">Água</option>
            <option value="Grama">Grama</option>
            <option value="Elétrico">Elétrico</option>
          </select>
        </div>
        <div class="form-group">
          <label>Preço (Kwz)</label>
          <input type="number" step="0.01" name="preco" required>
        </div>
        <div class="form-group">
          <label>Stock Inicial</label>
          <input type="number" name="quantidade" required>
        </div>
        <div class="form-group" style="grid-column: span 2;">
          <label>Imagem do Produto (Selecionar ficheiro)</label>
          <input type="file" name="foto" accept="image/*" required>
        </div>
        <button type="submit" class="btn-submit">➕ Salvar Produto e Fazer Upload</button>
      </form>
      <p id="mensagem" style="text-align: center; margin-top: 15px; font-weight: bold;"></p>
    </section>

    <section class="admin-section">
      <h2>Gerenciar Catálogo</h2>
      <table>
        <thead>
          <tr><th>Preview</th><th>Nome</th><th>Preço</th><th>Stock</th><th>Ações</th></tr>
        </thead>
        <tbody id="tabela-produtos"></tbody>
      </table>
    </section>
  </main>

  <script>
    async function carregarDashboard() {
      const response = await fetch('api_admin.php', { credentials: 'include' });
      const dados = await response.json();
      if (dados.sucesso) {
        document.getElementById('kpi-usuarios').textContent = dados.kpis.usuarios;
        document.getElementById('kpi-faturamento').textContent = Number(dados.kpis.faturamento).toFixed(2) + ' Kwz';
        document.getElementById('kpi-alertas').textContent = dados.kpis.alertas_count;

        const tbody = document.getElementById('tabela-produtos');
        tbody.innerHTML = '';
        dados.produtos.forEach(p => {
          tbody.innerHTML += `
            <tr>
              <td><img src="${p.imagem}" width="40" style="border-radius:4px"></td>
              <td><strong>${p.nome}</strong><br><small>${p.categoria}</small></td>
              <td>${Number(p.preco).toFixed(2)} Kwz</td>
              <td>${p.quantidade} un</td>
              <td><button class="btn-excluir" onclick="excluirProduto(${p.id})">Excluir</button></td>
            </tr>`;
        });
      }
    }

    document.getElementById('formAdicionarProduto').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('mensagem');
      msg.style.color = "blue";
      msg.textContent = "A processar upload...";

      const formData = new FormData(e.target); // Captura o ficheiro e os textos

      try {
        const res = await fetch('cadastrar_produto.php', {
          method: 'POST',
          body: formData,
          credentials: 'include'
        });
        const result = await res.json();
        if (result.sucesso) {
          msg.style.color = "green";
          msg.textContent = "Sucesso! Produto e imagem guardados.";
          e.target.reset();
          carregarDashboard();
        } else {
          msg.style.color = "red";
          msg.textContent = "Erro: " + result.erro;
        }
      } catch (err) { msg.textContent = "Erro de conexão."; }
    });

    async function excluirProduto(id) {
      if (!confirm('Excluir este item?')) return;
      await fetch('excluir_produto.php', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({id}),
        credentials: 'include'
      });
      carregarDashboard();
    }

    carregarDashboard();
  </script>
</body>
</html>
